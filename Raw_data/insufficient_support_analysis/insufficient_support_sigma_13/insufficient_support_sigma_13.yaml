# -----------------------------------------------------------------------------------------------------------
# Flow123d Input File
# Project: Internship CTU 2026
# Author: Ronald Ch. Siddall
# Description: Intentionally broken, analysis of insufficient support (rigid body motion)
# Stress tensor is of the form:
#        | sigma_11 sigma_12 sigma_13 |   in this case | 0   0   1e6 |
# sigma =| sigma_21 sigma_22 sigma_23 |        =>      | 0   0   0   |
#        | sigma_31 sigma_32 sigma_33 |                | 1e6 0   0   |
# -----------------------------------------------------------------------------------------------------------
# The goal: Demonstrate that equilibrium of forces (Sum F = 0) is insufficient for static boundary conditions,
# because if at least one point is not fixed in space, then the stiffness matrix becomes singular, 
# which causes free translation and rotation of the cube, which yields non physical results of deformation  
# ------------------------------------------------------------------------------------------------------------
flow123d_version: 3.9.0

problem: !Coupling_Sequential
  description: "3D linear elastic cube"

  mesh:
    mesh_file: ../uniform_stress_cube_3d.msh

  flow_equation: !Coupling_Iterative
    input_fields:
      - region: rock

    time:
      end_time: 1

    a_tol: 1e-18
    r_tol: 1e-18

    flow_equation: !Flow_Darcy_LMH
      gravity: [0, 0, 0]

      input_fields:
        - region: rock
          init_pressure: 0

        - region: .BOUNDARY
          bc_type: dirichlet
          bc_pressure: 0

      output:
        fields: []

    mechanics_equation: !Elasticity_Linear
      output_stream:
        file: mechanics.pvd
        format: !vtk
          variant: ascii

      output:
        fields:
          - displacement
          - stress

      solver: !Petsc
        a_tol: 1e-14
        r_tol: 1e-14

      input_fields:
        - region: rock
          young_modulus: 1e9
          poisson_ratio: 0.25

        # Intentionally commented out, this removes static determinacy
        # The stiffness matrix will now be singular resulting in rigid body motion 
       
        # - region: [.support_x, .support_y, .support_z]
        #   bc_type: displacement_n
        #   bc_displacement: 0.0


        # For the X surfaces (normals in X direction), the traction acts in the Z direction
        - region: .surface_x_plus
          bc_type: traction
          bc_traction: [0, 0, 1e6]
        
        - region: .surface_x_minus
          bc_type: traction
          bc_traction: [0, 0, -1e6]

        # For the Z surfaces (normals in Z direction), the traction acts in the X direction
        - region: .surface_z_plus
          bc_type: traction
          bc_traction: [1e6, 0, 0]

        - region: .surface_z_minus
          bc_type: traction
          bc_traction: [-1e6, 0, 0]